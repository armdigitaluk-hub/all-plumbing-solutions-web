about:
  titulo: Professional Plumbing & Heating Services in London
  parrafo_1: At All Plumbing Solutions, we provide reliable plumbing and heating engineering services, including 24/7 emergency service, boiler repairs, and bathroom installations in London.
  parrafo_2: Our team of Gas Safe registered engineers is dedicated to providing high-quality workmanship and transparent pricing. We handle everything from leaking taps to full bathroom refurbishments.
  parrafo_3: We are available 24/7 for emergency call-outs, ensuring that your plumbing and heating issues are addressed quickly and effectively.
titulo_servicios: Our Plumbing & Heating Solutions
servicios:
  - nombre: Emergency Plumbing (24/7)
    detalle: Prompt response for urgent plumbing issues, including burst pipes, severe leaks, and flooding.
    imagen: /images/gemini_generated_image_nlmgxfnlmgxfnlmg.png
  - nombre: Boiler Repairs & Servicing
    detalle: Expert diagnosis and repair of various boiler brands, including central heating maintenance and upgrades.
    imagen: /images/gemini_generated_image_mtxvq9mtxvq9mtxv.png
  - nombre: Bathroom Installation
    detalle: Full-service bathroom refurbishment, including shower installation, tiling, and complete plumbing setup.
    imagen: /images/gemini_generated_image_y4iyi2y4iyi2y4iy.png
  - nombre: General Plumbing
    detalle: Addressing common problems such as leaking taps, radiator repairs, and general pipework maintenance.
    imagen: /images/gemini_generated_image_vwqss3vwqss3vwqs.png
titulo_proyectos: Recent Plumbing & Heating Projects
proyectos:
  - nombre: Emergency Leak Repair
    ubicacion: Westminster
    detalle: Rapid response to a major pipe burst in a residential property, preventing extensive water damage.
    imagen: /images/gemini_generated_image_4svcwn4svcwn4svc.png
  - nombre: Full Bathroom Refurbishment
    ubicacion: Kensington
    detalle: Complete redesign and installation of a modern luxury bathroom with high-end fixtures.
    imagen: /images/gemini_generated_image_i474ki474ki474ki.png
  - nombre: Boiler Replacement
    ubicacion: Islington
    detalle: Upgrade to a high-efficiency combi boiler, including full system flush and smart thermostat installation.
    imagen: /images/gemini_generated_image_v6qmzav6qmzav6qm.png
