titulo: Frequently Asked Questions
faqs:
  - pregunta: Do you charge a call-out fee?
    respuesta: No. We do not charge a call-out fee for any of our services.
  - pregunta: How quickly can you attend for an emergency?
    respuesta: We aim to be with you within 60-90 minutes for emergencies, depending on location and traffic.
  - pregunta: Are your engineers Gas Safe registered?
    respuesta: Yes, all our gas engineers are fully Gas Safe registered and carry their ID cards at all times.
  - pregunta: Do you offer a guarantee on your work?
    respuesta: Yes, we offer a 12-month guarantee on all workmanship for your peace of mind.
